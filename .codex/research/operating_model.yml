schema_version: 1
model_id: accountable_swarm_research_operating_model_2026_06

work_allocation:
  exploration_share: 0.6
  execution_share: 0.4
  interpretation: >
    Explore broadly enough to find better demo paths, but only execute narrow
    experiments that can produce checked artifacts or a written no-go. Opening a
    good follow-up issue is progress; continuing an unfalsifiable experiment is
    not.

unit_of_work:
  type: issue_as_hypothesis
  required_fields:
    - thesis
    - why_it_matters
    - smallest_falsifying_experiment
    - go_gate
    - no_go_gate
    - required_artifacts
    - non_claims
    - local_validation_plan
  allowed_outcomes:
    - GO
    - NO_GO
    - NARROW_CLAIM
    - FOLLOWUP_ISSUE
    - KILL

agent_roles:
  scout:
    can_change_code: false
    default_output: research_issue_or_disclosure_update
  experimenter:
    can_change_code: true
    default_output: smallest_checked_artifact_or_no_go
  skeptic:
    can_change_code: true
    default_output: claim_breaker_or_hardening_followup
  integrator:
    can_change_code: true
    default_output: scoped_pr_with_claim_boundary

validation_policy:
  default_mode: local_first_github_ci_supporting_signal
  github_actions:
    normal_research_loop: discouraged
    merge_required_signal: local-gate
    use_for:
      - cross_machine_smoke
      - branch_protection_status
      - final_submission_check
  local_validation:
    required_before_push: true
    preferred_order:
      - "git diff --check"
      - "format or lint touched surfaces"
      - "targeted tests for edited modules"
      - "targeted evidence gates"
      - "artifact regeneration with exact commands"
      - "negative tests when trace, parser, safety, or evidence contracts changed"
  pr_body_must_include:
    - exact_local_validation_commands
    - lane
    - evidence_paths_when_relevant
    - non_claims_when_relevant
    - safety_security_notes_for_trusted_core

review_bot_policy:
  reviewers:
    - qodo
    - coderabbit
  reviewers_github_logins:
    - qodo-code-review
    - coderabbitai
  stance: cheap_adversarial_reviewers
  merge_rule:
    required_quiet_window_minutes: 5
    quiet_window_restarts_after:
      - relevant_qodo_feedback
      - relevant_coderabbit_feedback
      - relevant_human_feedback
      - any_push_after_feedback
    merge_allowed_only_when:
      - no_unresolved_relevant_qodo_findings
      - no_unresolved_relevant_coderabbit_findings
      - no_unresolved_relevant_human_threads
      - local_scoped_validation_passed
      - pr_claim_boundary_explicit
  triage_classes:
    must_fix:
      meaning: "real correctness, safety, security, reproducibility, evidence, or test-gap issue"
      action: "fix locally, add or update targeted validation, push again"
    evidence_needed:
      meaning: "comment may be correct but needs current-code inspection"
      action: "inspect current code, reproduce locally when possible, then fix or document"
    stale_or_false_positive:
      meaning: "bot is stale, misunderstood an invariant, or conflicts with a checked claim boundary"
      action: "reply briefly with evidence; avoid code churn"
    followup_issue:
      meaning: "valid but outside current PR scope"
      action: "open or update a follow-up issue with GO/NO-GO framing"
    ignore:
      meaning: "style-only preference with no correctness, safety, compliance, or research impact"
      action: "do not churn the PR"

merge_policy:
  command: "gh pr merge --rebase"
  merge_commits: forbidden
  auto_merge: forbidden
  requirements:
    - clean_worktree
    - local_validation_recorded
    - review_bot_quiet_window_satisfied
    - no_actionable_threads
    - branch_protection_or_status_state_understood

claim_discipline:
  public_claim_requires:
    - checked_evidence
    - exact_reproduction_commands
    - negative_or_malformed_input_checks_when_applicable
    - non_claims
    - disclosure_ledger_update
  no_go_behavior: >
    Record the barrier and narrow or kill the claim. Do not smooth over failed
    experiments as progress.
